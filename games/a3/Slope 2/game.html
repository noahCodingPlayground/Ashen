<!DOCTYPE html>
<html lang="en-us">
<head>
<meta charset="utf-8">
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slope 2 Player</title>
<meta name="robots" content="noindex">
<link rel="shortcut icon" href="TemplateData/favicon.ico">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/bubbls/UGS-Assets@b7188745eb03a3bde3183ff3494d0713ac5ad6c5/slope%202%20player/TemplateData/style.css">

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
}

#unity-container {
  position: fixed;
  inset: 0;
  width: 100vw;
  height: 100vh;
}

#unity-canvas {
  width: 100% !important;
  height: 100% !important;
  display: block;
}
</style>

</head>

<body>

<div id="unity-container" class="unity-desktop">
  <canvas id="unity-canvas" width="1280" height="720"></canvas>

  <div id="unity-loading-bar">
    <div id="unity-logo"></div>
    <div id="unity-progress-bar-empty">
      <div id="unity-progress-bar-full"></div>
    </div>
  </div>

  <div id="unity-mobile-warning">
    WebGL builds are not supported on mobile devices.
  </div>

  <div id="unity-footer">
    <div id="unity-webgl-logo"></div>
    <div id="unity-fullscreen-button"></div>
  </div>
</div>

<script>
var buildUrl = "";
var loaderUrl = buildUrl + "https://cdn.jsdelivr.net/gh/bubbls/UGS-Assets@b7188745eb03a3bde3183ff3494d0713ac5ad6c5/slope%202%20player/Build/WebGL2Players%20v1.1.loader.js";
var config = {
  dataUrl: buildUrl + "https://cdn.jsdelivr.net/gh/bubbls/UGS-Assets@b7188745eb03a3bde3183ff3494d0713ac5ad6c5/slope%202%20player/Build/WebGL2Players%20v1.1.data.unityweb",
  frameworkUrl: buildUrl + "https://cdn.jsdelivr.net/gh/bubbls/UGS-Assets@b7188745eb03a3bde3183ff3494d0713ac5ad6c5/slope%202%20player/Build/WebGL2Players%20v1.1.framework.js.unityweb",
  codeUrl: buildUrl + "https://cdn.jsdelivr.net/gh/bubbls/UGS-Assets@b7188745eb03a3bde3183ff3494d0713ac5ad6c5/slope%202%20player/Build/WebGL2Players%20v1.1.wasm.unityweb",
  streamingAssetsUrl: "StreamingAssets",
  companyName: "DefaultCompany",
  productName: "Slope 2 Player",
  productVersion: "1",
};

var container = document.querySelector("#unity-container");
var canvas = document.querySelector("#unity-canvas");
var loadingBar = document.querySelector("#unity-loading-bar");
var progressBarFull = document.querySelector("#unity-progress-bar-full");
var fullscreenButton = document.querySelector("#unity-fullscreen-button");
var mobileWarning = document.querySelector("#unity-mobile-warning");

if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
  container.className = "unity-mobile";
  config.devicePixelRatio = 1;
  mobileWarning.style.display = "block";
  setTimeout(() => {
    mobileWarning.style.display = "none";
  }, 5000);
} else {
  canvas.style.width = "100%";
  canvas.style.height = "100%";
}

loadingBar.style.display = "block";

var script = document.createElement("script");
script.src = loaderUrl;
script.onload = () => {
  createUnityInstance(canvas, config, (progress) => {
    progressBarFull.style.width = 100 * progress + "%";
  }).then((unityInstance) => {
    loadingBar.style.display = "none";
    fullscreenButton.onclick = () => {
      unityInstance.SetFullscreen(1);
    };
  }).catch((message) => {
    console.log(message);
  });
};

document.body.appendChild(script);
</script>

</body>
</html>
