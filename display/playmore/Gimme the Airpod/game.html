<!DOCTYPE html>
<html lang="en-us">
<head>
<meta charset="utf-8">
<title>Unity WebGL Player</title>

<base href="https://cdn.jsdelivr.net/gh/bubbls/UGS-Assets@6a23ed7ae219e6566781b0d8486ed2b50b1ec20a/gimmie%20the%20airpod/" />

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: black;
}
</style>

<script src="Build/UnityLoader.js"></script>

<script>
const originalInstantiate = UnityLoader.instantiate;

UnityLoader.instantiate = function(containerId, buildUrl, options) {
    const instance = originalInstantiate(containerId, buildUrl, options);

    const container = document.getElementById(containerId);

    const observer = new MutationObserver(() => {
        const canvas = container ? container.querySelector("canvas") : null;

        if (container) {
            container.style.width = "100vw";
            container.style.height = "100vh";
            container.style.position = "fixed";
            container.style.top = "0";
            container.style.left = "0";
            container.style.margin = "0";
            container.style.padding = "0";
        }

        if (canvas) {
            canvas.style.width = "100%";
            canvas.style.height = "100%";
        }
    });

    observer.observe(container, {
        attributes: true,
        childList: true,
        subtree: true
    });

    return instance;
};
</script>

</head>

<body>
<div id="unityContainer"></div>

<script>
UnityLoader.instantiate("unityContainer", "Build/Build.json");
</script>

</body>
</html>
